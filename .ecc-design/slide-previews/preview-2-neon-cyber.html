<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview: Neon Cyber</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Satoshi:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
.slide {
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: #0d0221;
  position: relative;
  font-family: 'Noto Sans TC', 'Satoshi', sans-serif;
}
/* Grid background */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 1;
}
/* Glow orb */
.glow {
  position: absolute;
  width: clamp(300px, 40vw, 600px);
  height: clamp(300px, 40vw, 600px);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,255,0.12) 0%, rgba(255,0,255,0.08) 50%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  animation: pulse 4s ease-in-out infinite;
}
.content {
  position: relative; z-index: 2;
  text-align: center;
  padding: clamp(1rem, 4vw, 4rem);
}
.top-label {
  font-size: clamp(0.6rem, 1vw, 0.8rem);
  color: #00ffff;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
  font-weight: 700;
}
h1 {
  font-size: clamp(2rem, 6vw, 5rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 1.15;
  margin-bottom: clamp(0.5rem, 1.5vw, 1rem);
}
h1 .cyan { color: #00ffff; text-shadow: 0 0 40px rgba(0,255,255,0.5); }
h1 .magenta { color: #ff00ff; text-shadow: 0 0 40px rgba(255,0,255,0.5); }
.subtitle {
  font-size: clamp(0.75rem, 1.5vw, 1.1rem);
  color: rgba(255,255,255,0.5);
  margin-top: clamp(0.5rem, 1vw, 1rem);
  font-weight: 400;
}
.divider {
  width: clamp(80px, 12vw, 150px);
  height: 2px;
  background: linear-gradient(90deg, #00ffff, #ff00ff);
  margin: clamp(1rem, 2vw, 1.5rem) auto;
  box-shadow: 0 0 15px rgba(0,255,255,0.4);
}
.info-row {
  display: flex;
  gap: clamp(0.5rem, 2vw, 1.5rem);
  justify-content: center;
  flex-wrap: wrap;
  margin-top: clamp(0.5rem, 1.5vw, 1rem);
}
.info-chip {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.2);
  color: rgba(255,255,255,0.7);
  font-size: clamp(0.55rem, 1vw, 0.75rem);
  padding: 0.35em 0.9em;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.2s !important;
  }
}
</style>
</head>
<body>
<section class="slide">
  <div class="glow"></div>
  <div class="content">
    <div class="top-label">高科大 ── 產險資料分析</div>
    <h1><span class="cyan">車險理賠</span><br>預測<span class="magenta">實戰</span></h1>
    <div class="divider"></div>
    <p class="subtitle">Python × 資料探勘 × Vibe Coding ── 從 0 到 1</p>
    <div class="info-row">
      <span class="info-chip">業界講師：侯冠宇</span>
      <span class="info-chip">AI 系統架構師</span>
      <span class="info-chip">3 小時實戰</span>
    </div>
  </div>
</section>
</body>
</html>
